<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DPL Jersey Selection</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body { background:#06090f; color:#fff; font-family:'DM Sans'; margin:0; }
header { text-align:center; padding:40px; }
h1 { font-family:'Bebas Neue'; font-size:60px; }

.form-grid { max-width:900px; margin:auto; display:grid; gap:10px; padding:20px; }
.card { background:#111827; padding:15px; border-radius:10px; display:flex; justify-content:space-between; align-items:center; }

select { padding:8px; border-radius:6px; }

.locked { border:1px solid #22c55e; }

button {
  background:#f5a623; border:none; padding:15px 30px;
  font-size:18px; border-radius:50px; cursor:pointer;
}
button:disabled { opacity:0.4; }
</style>
</head>

<body>

<header>
<h1>DPL Jersey Selection</h1>
<p>Select once → permanently locked</p>
</header>

<div class="form-grid" id="formGrid"></div>

<div style="text-align:center; margin:20px;">
<button id="submitBtn" disabled>CONFIRM</button>
</div>

<script>
const API_URL = "PASTE_YOUR_GOOGLE_SCRIPT_URL_HERE";

const COLOURS = [
"Red","Blue","Green","Yellow","Orange","Purple","Black","White",
"Grey","Maroon","Sky Blue","Navy Blue","Teal","Lime","Pink","Brown",
"Gold","Silver","Violet","Indigo","Coral","Turquoise","Olive","Magenta",
"Beige","Mustard","Peach","Mint","Lavender","Crimson","Charcoal","Aqua"
];

const TEAMS = [
"TDL Group","BARCLAYS","INFOSYS","TDS","Congruent","V Ships","Walmart","Salpcom",
"NASCO","ENSONO","INTELECT","CAMS","Zoho","Ovation","Standard Chartered",
"Spectra Medical","GEN DIGITAL","APOLLO TYRES","HCL","FOURKITES",
"Societe Generale","Agilisium","DAE","Hapag Lloyd",
"Comcast","Walmart Tech","Zifo","Fidelity"
];

let selections = {};

/* 🔥 FETCH EXISTING DATA (KEY PART) */
async function loadData() {
  const res = await fetch(API_URL);
  const data = await res.json();
  selections = data || {};
  buildForm();
}

/* BUILD UI */
function buildForm() {
  const grid = document.getElementById('formGrid');
  grid.innerHTML = '';

  const used = new Set(Object.values(selections));

  TEAMS.forEach((team, i) => {
    const selected = selections[team];

    const card = document.createElement('div');
    card.className = 'card' + (selected ? ' locked' : '');

    let options = `<option value="">Select Colour</option>`;

    COLOURS.forEach(c => {
      const taken = used.has(c) && c !== selected;
      options += `<option value="${c}" 
        ${selected === c ? 'selected' : ''}
        ${taken ? 'disabled' : ''}>
        ${taken ? '✕ ' : ''}${c}
      </option>`;
    });

    card.innerHTML = `
      <strong>${team}</strong>
      <select onchange="pick('${team}', this)" ${selected ? 'disabled' : ''}>
        ${options}
      </select>
    `;

    grid.appendChild(card);
  });

  updateBtn();
}

/* PICK */
async function pick(team, sel) {
  const colour = sel.value;
  if (!colour) return;

  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ team, colour })
  });

  const data = await res.json();

  if (data.status === "error") {
    alert(data.message);
    sel.value = "";
    return;
  }

  selections[team] = colour;
  buildForm();
}

/* BUTTON */
function updateBtn() {
  document.getElementById('submitBtn').disabled =
    Object.keys(selections).length !== TEAMS.length;
}

/* INIT */
loadData();
</script>

</body>
</html>

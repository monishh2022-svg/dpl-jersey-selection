<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DPL Cricket League — Jersey Colour Selection</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body { background:#06090f; color:#fff; font-family:'DM Sans'; margin:0; }
header { text-align:center; padding:40px; }
h1 { font-family:'Bebas Neue'; font-size:60px; }

.form-grid { max-width:900px; margin:auto; padding:20px; display:grid; gap:12px; }
.card {
  background:#111827;
  padding:15px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.locked { border:2px solid #22c55e; }

select {
  padding:8px;
  border-radius:6px;
  background:#1f2937;
  color:#fff;
  border:none;
}
</style>
</head>

<body>

<header>
  <h1>DPL JERSEY SELECTION</h1>
  <p>Select once → permanently locked</p>
</header>

<div class="form-grid" id="formGrid"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzqTuJ7ZN31ZbOK5LZ3jfTlDi83RqflO233OJf9a4QpVKcVMSJ2Tj-Yc3d0U6_Zn1P_UQ/exec";

const COLOURS = [
{name:"Red",hex:"#FF0000"},{name:"Blue",hex:"#0000FF"},
{name:"Green",hex:"#00FF00"},{name:"Yellow",hex:"#FFFF00"},
{name:"Orange",hex:"#FFA500"},{name:"Purple",hex:"#800080"},
{name:"Pink",hex:"#FFC0CB"},{name:"Sky Blue",hex:"#87CEEB"},
{name:"Navy Blue",hex:"#000080"},{name:"Maroon",hex:"#800000"},
{name:"Lime",hex:"#32CD32"},{name:"Teal",hex:"#008080"},
{name:"Olive",hex:"#808000"},{name:"Cyan",hex:"#00FFFF"},
{name:"Magenta",hex:"#FF00FF"},{name:"Gold",hex:"#FFD700"},
{name:"Bronze",hex:"#CD7F32"},{name:"Coral",hex:"#FF7F50"},
{name:"Turquoise",hex:"#40E0D0"},{name:"Indigo",hex:"#4B0082"},
{name:"Violet",hex:"#EE82EE"},{name:"Crimson",hex:"#DC143C"},
{name:"Khaki",hex:"#F0E68C"},{name:"Mint",hex:"#98FF98"},
{name:"Chocolate",hex:"#D2691E"},{name:"Charcoal",hex:"#36454F"},
{name:"Royal Blue",hex:"#4169E1"},{name:"Neon Green",hex:"#39FF14"},
{name:"Hot Pink",hex:"#FF1493"},{name:"Deep Orange",hex:"#FF4500"},
{name:"Electric Blue",hex:"#7DF9FF"},{name:"Dark Forest Green",hex:"#014421"}
];

const TEAMS = [
"TDL Group","BARCLAYS","INFOSYS","TDS","Congruent","V Ships","Walmart","Salpcom",
"NASCO","ENSONO","INTELECT","CAMS","Zoho","Ovation","Standard Chartered",
"Spectra Medical","GEN DIGITAL","APOLLO TYRES","HCL","FOURKITES",
"Societe Generale","Agilisium","DAE","Hapag Lloyd",
"Comcast","Walmart Tech","Zifo","Fidelity"
];

let selections = {};
let locked = {};

// 🔄 LOAD DATA FROM GOOGLE SHEET
async function loadData() {
  try {
    const res = await fetch(API_URL + "?t=" + Date.now());
    const text = await res.text();

    if (!text.startsWith("{")) return;

    const data = JSON.parse(text);

    selections = {};
    locked = {};

    Object.keys(data).forEach(team => {
      const idx = TEAMS.indexOf(team);
      if (idx !== -1) {
        selections[idx] = data[team];
        locked[idx] = true;
      }
    });

    buildUI();

  } catch (err) {
    console.log("Load error");
  }
}

// 🎨 BUILD UI
function buildUI() {
  const grid = document.getElementById("formGrid");
  grid.innerHTML = "";

  const used = new Set(Object.values(selections));

  TEAMS.forEach((team, idx) => {
    const selected = selections[idx];
    const selectedColor = COLOURS.find(c => c.name === selected);

    let options = `<option value="">Select Colour</option>`;

    COLOURS.forEach(col => {
      const taken = used.has(col.name) && col.name !== selected;

      options += `
        <option value="${col.name}"
          ${selected === col.name ? "selected" : ""}
          ${taken ? "disabled" : ""}>
          ${taken ? "✕ " : ""}${col.name} (${col.hex})
        </option>
      `;
    });

    const card = document.createElement("div");
    card.className = "card" + (selected ? " locked" : "");

    card.innerHTML = `
      <strong>${team}</strong>
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:20px;height:20px;border-radius:50%;
          background:${selectedColor ? selectedColor.hex : '#333'}"></div>
        <select onchange="selectColour(${idx}, this)" ${selected ? "disabled" : ""}>
          ${options}
        </select>
      </div>
    `;

    grid.appendChild(card);
  });
}

// 💾 SAVE DATA
async function selectColour(idx, el) {
  const colour = el.value;
  if (!colour) return;

  if (!confirm("Are you sure? This cannot be changed.")) {
    el.value = "";
    return;
  }

  try {
    const res = await fetch(API_URL, {
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify({
        team: TEAMS[idx],
        colour: colour
      })
    });

    const text = await res.text();
    const data = JSON.parse(text);

    if (data.status === "error") {
      alert(data.message);
      el.value = "";
      return;
    }

    selections[idx] = colour;
    locked[idx] = true;

    buildUI();

  } catch {
    alert("Server error");
  }
}

// INIT
buildUI();
loadData();

// 🔄 LIVE SYNC
setInterval(loadData, 2000);

</script>

</body>
</html>

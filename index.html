<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DPL Jersey Selection</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body { background:#06090f; color:#fff; font-family:'DM Sans'; margin:0; }
header { text-align:center; padding:40px; }
h1 { font-family:'Bebas Neue'; font-size:60px; }

.form-grid { max-width:900px; margin:auto; display:grid; gap:12px; padding:20px; }

.card {
  background:#111827;
  padding:15px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.locked { border:2px solid #22c55e; }

select {
  padding:8px;
  border-radius:6px;
  background:#1f2937;
  color:#fff;
  border:none;
}
</style>
</head>

<body>

<header>
  <h1>DPL JERSEY SELECTION</h1>
  <p>Select once → permanently locked</p>
</header>

<div class="form-grid" id="formGrid"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzqTuJ7ZN31ZbOK5LZ3jfTlDi83RqflO233OJf9a4QpVKcVMSJ2Tj-Yc3d0U6_Zn1P_UQ/exec";

const COLOURS = [
"Red","Blue","Green","Yellow","Orange","Purple","Black","White",
"Grey","Maroon","Sky Blue","Navy Blue","Teal","Lime","Pink","Brown",
"Gold","Silver","Violet","Indigo","Coral","Turquoise","Olive","Magenta",
"Beige","Mustard","Peach","Mint","Lavender","Crimson","Charcoal","Aqua"
];

const TEAMS = [
"TDL Group","BARCLAYS","INFOSYS","TDS","Congruent","V Ships","Walmart","Salpcom",
"NASCO","ENSONO","INTELECT","CAMS","Zoho","Ovation","Standard Chartered",
"Spectra Medical","GEN DIGITAL","APOLLO TYRES","HCL","FOURKITES",
"Societe Generale","Agilisium","DAE","Hapag Lloyd",
"Comcast","Walmart Tech","Zifo","Fidelity"
];

let selections = {};

// 🔥 BUILD UI
function buildUI() {
  const grid = document.getElementById("formGrid");
  grid.innerHTML = "";

  const used = new Set(Object.values(selections));

  TEAMS.forEach(team => {
    const selected = selections[team];

    let options = `<option value="">Select Colour</option>`;

    COLOURS.forEach(col => {
      const taken = used.has(col) && col !== selected;

      options += `
        <option value="${col}" 
          ${selected === col ? "selected" : ""}
          ${taken ? "disabled" : ""}>
          ${taken ? "✕ " : ""}${col}
        </option>
      `;
    });

    const card = document.createElement("div");
    card.className = "card" + (selected ? " locked" : "");

    card.innerHTML = `
      <strong>${team}</strong>
      <select onchange="selectColour('${team}', this)" ${selected ? "disabled" : ""}>
        ${options}
      </select>
    `;

    grid.appendChild(card);
  });
}

// 🔄 LOAD DATA FROM SHEET
async function loadData() {
  try {
    const res = await fetch(API_URL + "?t=" + Date.now());
    const text = await res.text();

    if (text && text.startsWith("{")) {
      selections = JSON.parse(text);
      buildUI();
    }

  } catch (err) {
    console.log("Fetch error");
  }
}

// 💾 SAVE DATA
async function selectColour(team, el) {
  const colour = el.value;
  if (!colour) return;

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ team, colour })
    });

    const text = await res.text();
    const data = JSON.parse(text);

    if (data.status === "error") {
      alert(data.message);
      el.value = "";
      return;
    }

    selections[team] = colour;
    buildUI();

  } catch (err) {
    alert("Server error");
  }
}

// 🔥 INITIAL LOAD
buildUI();
loadData();

// 🔄 AUTO SYNC EVERY 3 SECONDS (IMPORTANT)
setInterval(loadData, 3000);

</script>

</body>
</html>

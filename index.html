<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DPL Jersey Selection</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body { background:#06090f; color:#fff; font-family:'DM Sans'; margin:0; }

header { text-align:center; padding:40px; }
h1 { font-family:'Bebas Neue'; font-size:60px; }

.form-grid {
  max-width:1000px;
  margin:auto;
  display:grid;
  gap:20px;
  padding:20px;
}

.card {
  background:#111827;
  padding:20px;
  border-radius:12px;
}

.locked { border:2px solid #22c55e; }

.team-name { font-weight:600; margin-bottom:12px; }

.color-grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(40px, 1fr));
  gap:8px;
}

.color-box {
  width:40px;
  height:40px;
  border-radius:6px;
  cursor:pointer;
  border:2px solid transparent;
  transition:0.2s;
}

.color-box:hover { transform:scale(1.1); }

.taken { opacity:0.3; cursor:not-allowed; }

.selected { border:3px solid #fff; }

.label { margin-top:10px; font-size:12px; color:#aaa; }
</style>
</head>

<body>

<header>
  <h1>DPL JERSEY SELECTION</h1>
  <p>Select once → permanently locked</p>
</header>

<div class="form-grid" id="formGrid"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzqTuJ7ZN31ZbOK5LZ3jfTlDi83RqflO233OJf9a4QpVKcVMSJ2Tj-Yc3d0U6_Zn1P_UQ/exec";
const USER_KEY = "dpl_selected_team";

/* ✅ SORTED TEAMS */
const TEAMS = [
"TDL Group","BARCLAYS","INFOSYS","TDS","Congruent","V Ships","Walmart","Salpcom",
"NASCO","ENSONO","INTELECT","CAMS","Zoho","Ovation","Standard Chartered",
"Spectra Medical","GEN DIGITAL","APOLLO TYRES","HCL","FOURKITES",
"Societe Generale","Agilisium","DAE","Hapag Lloyd",
"Comcast","Walmart Tech","Zifo","Fidelity","Yamaha","Expeditors","Tredence"
].sort((a,b)=>a.localeCompare(b));

const COLOURS = [
{name:"Red",hex:"#FF0000"},{name:"Blue",hex:"#0000FF"},
{name:"Green",hex:"#00FF00"},{name:"Yellow",hex:"#FFFF00"},
{name:"Orange",hex:"#FFA500"},{name:"Purple",hex:"#800080"},
{name:"Pink",hex:"#FFC0CB"},{name:"Sky Blue",hex:"#87CEEB"},
{name:"Navy Blue",hex:"#000080"},{name:"Maroon",hex:"#800000"},
{name:"Lime",hex:"#32CD32"},{name:"Teal",hex:"#008080"},
{name:"Olive",hex:"#808000"},{name:"Cyan",hex:"#00FFFF"},
{name:"Magenta",hex:"#FF00FF"},{name:"Gold",hex:"#FFD700"},
{name:"Bronze",hex:"#CD7F32"},{name:"Coral",hex:"#FF7F50"},
{name:"Turquoise",hex:"#40E0D0"},{name:"Indigo",hex:"#4B0082"},
{name:"Violet",hex:"#EE82EE"},{name:"Crimson",hex:"#DC143C"},
{name:"Khaki",hex:"#F0E68C"},{name:"Mint",hex:"#98FF98"},
{name:"Chocolate",hex:"#D2691E"},{name:"Charcoal",hex:"#36454F"},
{name:"Royal Blue",hex:"#4169E1"},{name:"Neon Green",hex:"#39FF14"},
{name:"Hot Pink",hex:"#FF1493"},{name:"Deep Orange",hex:"#FF4500"},
{name:"Electric Blue",hex:"#7DF9FF"},{name:"Dark Forest Green",hex:"#014421"}
];

let selections = {};
let lockedTeam = localStorage.getItem(USER_KEY);

/* 🎨 UI (CRASH SAFE) */
function buildUI() {
  try {
    const grid = document.getElementById("formGrid");
    if (!grid) return;

    grid.innerHTML = "";

    const used = new Set(Object.values(selections));

    TEAMS.forEach(team => {
      const selected = selections[team];
      const isUserLocked = lockedTeam && lockedTeam !== team;

      const card = document.createElement("div");
      card.className = "card" + (selected ? " locked" : "");

      let colorGrid = `<div class="color-grid">`;

      COLOURS.forEach(col => {
        const isTaken = used.has(col.name) && col.name !== selected;
        const isSelected = selected === col.name;
        const disableClick = isTaken || selected || isUserLocked;

        colorGrid += `
          <div 
            class="color-box 
            ${isTaken ? "taken" : ""} 
            ${isSelected ? "selected" : ""} 
            ${isUserLocked ? "taken" : ""}"
            style="background:${col.hex}"
            onclick="${!disableClick ? `selectColour('${team}','${col.name}')` : ''}">
          </div>
        `;
      });

      colorGrid += `</div>`;

      card.innerHTML = `
        <div class="team-name">${team}</div>
        ${colorGrid}
        <div class="label">
          ${selected ? `Selected: ${selected}` : 
            isUserLocked ? "🔒 One team only - Don't touch my team colour bro" : "Select a colour"}
        </div>
      `;

      grid.appendChild(card);
    });

  } catch (err) {
    console.log("UI Error:", err);
  }
}

/* 💾 SAVE */
async function selectColour(team, colour) {

  if (lockedTeam && lockedTeam !== team) {
    alert("You can select only one team!");
    return;
  }

  if (!confirm(`Confirm ${colour}?`)) return;

  try {
    const res = await fetch(API_URL, {
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify({team, colour})
    });

    const text = await res.text();

    if (!text.startsWith("{")) return;

    const data = JSON.parse(text);

    if (data.status === "error") {
      alert(data.message);
      return;
    }

    localStorage.setItem(USER_KEY, team);
    lockedTeam = team;

    selections[team] = colour;
    buildUI();

  } catch (err) {
    console.log(err);
  }
}

/* 🔄 LOAD (SAFE) */
async function loadData() {
  try {
    const res = await fetch(API_URL + "?t=" + Date.now());
    const text = await res.text();

    if (!text || !text.startsWith("{")) {
      buildUI();
      return;
    }

    const data = JSON.parse(text);

    const clean = {};

    Object.keys(data).forEach(team => {
      const t = team.trim();
      const c = (data[team] || "").trim();

      const valid = COLOURS.find(x => x.name === c);
      clean[t] = valid ? c : "";
    });

    selections = clean;
    buildUI();

  } catch (err) {
    console.log(err);
    buildUI();
  }
}

/* 🚀 INIT */
buildUI();   // always show UI
loadData();  // sync data
setInterval(loadData, 2000);

</script>

</body>
</html>

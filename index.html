<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DPL Jersey Selection</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body { background:#06090f; color:#fff; font-family:'DM Sans'; margin:0; }

header { text-align:center; padding:40px; }
h1 { font-family:'Bebas Neue'; font-size:60px; }

.form-grid {
  max-width:950px;
  margin:auto;
  display:grid;
  gap:12px;
  padding:20px;
}

.card {
  background:#111827;
  padding:15px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.locked {
  border:2px solid #22c55e;
}

.select-wrap {
  display:flex;
  align-items:center;
  gap:10px;
}

.color-dot {
  width:20px;
  height:20px;
  border-radius:50%;
  border:1px solid #fff;
}

select {
  padding:8px;
  border-radius:6px;
  background:#1f2937;
  color:#fff;
  border:none;
}
</style>
</head>

<body>

<header>
  <h1>DPL JERSEY SELECTION</h1>
  <p>Select once → permanently locked</p>
</header>

<div class="form-grid" id="formGrid"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzqTuJ7ZN31ZbOK5LZ3jfTlDi83RqflO233OJf9a4QpVKcVMSJ2Tj-Yc3d0U6_Zn1P_UQ/exec";

const COLOURS = [
{name:"Red", hex:"#FF0000"},
{name:"Blue", hex:"#0000FF"},
{name:"Green", hex:"#00FF00"},
{name:"Yellow", hex:"#FFFF00"},
{name:"Orange", hex:"#FFA500"},
{name:"Purple", hex:"#800080"},
{name:"Pink", hex:"#FFC0CB"},
{name:"Sky Blue", hex:"#87CEEB"},
{name:"Navy Blue", hex:"#000080"},
{name:"Maroon", hex:"#800000"},
{name:"Lime", hex:"#32CD32"},
{name:"Teal", hex:"#008080"},
{name:"Olive", hex:"#808000"},
{name:"Cyan", hex:"#00FFFF"},
{name:"Magenta", hex:"#FF00FF"},
{name:"Gold", hex:"#FFD700"},
{name:"Bronze", hex:"#CD7F32"},
{name:"Coral", hex:"#FF7F50"},
{name:"Turquoise", hex:"#40E0D0"},
{name:"Indigo", hex:"#4B0082"},
{name:"Violet", hex:"#EE82EE"},
{name:"Crimson", hex:"#DC143C"},
{name:"Khaki", hex:"#F0E68C"},
{name:"Mint", hex:"#98FF98"},
{name:"Chocolate", hex:"#D2691E"},
{name:"Charcoal", hex:"#36454F"},
{name:"Royal Blue", hex:"#4169E1"},
{name:"Neon Green", hex:"#39FF14"},
{name:"Hot Pink", hex:"#FF1493"},
{name:"Deep Orange", hex:"#FF4500"},
{name:"Electric Blue", hex:"#7DF9FF"},
{name:"Dark Forest Green", hex:"#014421"}
];

const TEAMS = [
"TDL Group","BARCLAYS","INFOSYS","TDS","Congruent","V Ships","Walmart","Salpcom",
"NASCO","ENSONO","INTELECT","CAMS","Zoho","Ovation","Standard Chartered",
"Spectra Medical","GEN DIGITAL","APOLLO TYRES","HCL","FOURKITES",
"Societe Generale","Agilisium","DAE","Hapag Lloyd",
"Comcast","Walmart Tech","Zifo","Fidelity"
];

let selections = {};

// 🎨 BUILD UI
function buildUI() {
  const grid = document.getElementById("formGrid");
  grid.innerHTML = "";

  const used = new Set(Object.values(selections));

  TEAMS.forEach(team => {
    const selected = selections[team];
    const selectedColor = COLOURS.find(c => c.name === selected);

    let options = `<option value="">Select Colour</option>`;

    COLOURS.forEach(col => {
      const taken = used.has(col.name) && col.name !== selected;

      options += `
        <option value="${col.name}"
          ${selected === col.name ? "selected" : ""}
          ${taken ? "disabled" : ""}>
          ${taken ? "✕ " : ""}${col.name} (${col.hex})
        </option>
      `;
    });

    const card = document.createElement("div");
    card.className = "card" + (selected ? " locked" : "");

    card.innerHTML = `
      <strong>${team}</strong>

      <div class="select-wrap">
        <div class="color-dot" style="background:${selectedColor ? selectedColor.hex : '#333'}"></div>

        <select onchange="selectColour('${team}', this)" ${selected ? "disabled" : ""}>
          ${options}
        </select>
      </div>
    `;

    grid.appendChild(card);
  });
}

// 🔄 LOAD DATA
async function loadData() {
  try {
    const res = await fetch(API_URL + "?t=" + Date.now());
    const text = await res.text();

    if (text && text.startsWith("{")) {
      selections = JSON.parse(text);
      buildUI();
    }
  } catch (err) {
    console.log("Fetch error");
  }
}

// 💾 SAVE DATA
async function selectColour(team, el) {
  const colour = el.value;

  if (!confirm("Are you sure? This cannot be changed.")) {
    el.value = "";
    return;
  }

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ team, colour })
    });

    const text = await res.text();
    const data = JSON.parse(text);

    if (data.status === "error") {
      alert(data.message);
      el.value = "";
      return;
    }

    selections[team] = colour;
    buildUI();

  } catch (err) {
    alert("Server error");
  }
}

// INIT
buildUI();
loadData();

// 🔄 LIVE SYNC
setInterval(loadData, 2000);
</script>

</body>
</html>

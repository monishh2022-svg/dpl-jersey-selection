<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzqTuJ7ZN31ZbOK5LZ3jfTlDi83RqflO233OJf9a4QpVKcVMSJ2Tj-Yc3d0U6_Zn1P_UQ/exec";
const USER_KEY = "dpl_selected_team";

const TEAMS = [
"TDL Group","BARCLAYS","INFOSYS","TDS","Congruent","V Ships","Walmart","Salpcom",
"NASCO","ENSONO","INTELECT","CAMS","Zoho","Ovation","Standard Chartered",
"Spectra Medical","GEN DIGITAL","APOLLO TYRES","HCL","FOURKITES",
"Societe Generale","Agilisium","DAE","Hapag Lloyd",
"Comcast","Walmart Tech","Zifo","Fidelity","Yamaha","Expeditors","Tredence"
].sort((a,b)=>a.localeCompare(b));

const COLOURS = [
{name:"Red",hex:"#FF0000"},{name:"Blue",hex:"#0000FF"},
{name:"Green",hex:"#00FF00"},{name:"Yellow",hex:"#FFFF00"},
{name:"Orange",hex:"#FFA500"},{name:"Purple",hex:"#800080"},
{name:"Pink",hex:"#FFC0CB"},{name:"Sky Blue",hex:"#87CEEB"},
{name:"Navy Blue",hex:"#000080"},{name:"Maroon",hex:"#800000"},
{name:"Lime",hex:"#32CD32"},{name:"Teal",hex:"#008080"},
{name:"Olive",hex:"#808000"},{name:"Cyan",hex:"#00FFFF"},
{name:"Magenta",hex:"#FF00FF"},{name:"Gold",hex:"#FFD700"},
{name:"Bronze",hex:"#CD7F32"},{name:"Coral",hex:"#FF7F50"},
{name:"Turquoise",hex:"#40E0D0"},{name:"Indigo",hex:"#4B0082"},
{name:"Violet",hex:"#EE82EE"},{name:"Crimson",hex:"#DC143C"},
{name:"Khaki",hex:"#F0E68C"},{name:"Mint",hex:"#98FF98"},
{name:"Chocolate",hex:"#D2691E"},{name:"Charcoal",hex:"#36454F"},
{name:"Royal Blue",hex:"#4169E1"},{name:"Neon Green",hex:"#39FF14"},
{name:"Hot Pink",hex:"#FF1493"},{name:"Deep Orange",hex:"#FF4500"},
{name:"Electric Blue",hex:"#7DF9FF"},{name:"Dark Forest Green",hex:"#014421"}
];

let selections = {};
let lockedTeam = localStorage.getItem(USER_KEY);

/* ✅ ALWAYS RENDER UI */
function buildUI() {
  try {
    const grid = document.getElementById("formGrid");
    if (!grid) return;

    grid.innerHTML = "";

    const used = new Set(Object.values(selections));

    TEAMS.forEach(team => {
      const selected = selections[team];
      const isUserLocked = lockedTeam && lockedTeam !== team;

      const card = document.createElement("div");
      card.className = "card" + (selected ? " locked" : "");

      let colorGrid = `<div class="color-grid">`;

      COLOURS.forEach(col => {
        const isTaken = used.has(col.name) && col.name !== selected;
        const isSelected = selected === col.name;
        const disableClick = isTaken || selected || isUserLocked;

        colorGrid += `
          <div 
            class="color-box 
            ${isTaken ? "taken" : ""} 
            ${isSelected ? "selected" : ""} 
            ${isUserLocked ? "taken" : ""}"
            style="background:${col.hex}"
            onclick="${!disableClick ? `selectColour('${team}', '${col.name}')` : ''}">
          </div>
        `;
      });

      colorGrid += `</div>`;

      card.innerHTML = `
        <div class="team-name">${team}</div>
        ${colorGrid}
        <div class="label">
          ${selected ? `Selected: ${selected}` : 
            isUserLocked ? "🔒 One team only - Dont block my team jersey bro" : "Select a colour"}
        </div>
      `;

      grid.appendChild(card);
    });

  } catch (err) {
    console.log("UI Error:", err);
  }
}

/* 💾 SAVE */
async function selectColour(team, colour) {

  if (lockedTeam && lockedTeam !== team) {
    alert("You can select only one team!");
    return;
  }

  if (!confirm(`Confirm ${colour}?`)) return;

  try {
    const res = await fetch(API_URL, {
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify({team, colour})
    });

    const text = await res.text();

    if (!text.startsWith("{")) {
      alert("Server error");
      return;
    }

    const data = JSON.parse(text);

    if (data.status === "error") {
      alert(data.message);
      return;
    }

    localStorage.setItem(USER_KEY, team);
    lockedTeam = team;

    selections[team] = colour;
    buildUI();

  } catch (err) {
    console.log(err);
    alert("Network error");
  }
}

/* 🔄 SAFE LOAD */
async function loadData() {
  try {
    const res = await fetch(API_URL + "?t=" + Date.now());
    const text = await res.text();

    if (text && text.startsWith("{")) {
      selections = JSON.parse(text);
      buildUI();
    } else {
      console.log("Invalid API response");
    }

  } catch (err) {
    console.log("Fetch failed → using local UI");
  }
}

/* 🚀 INIT */
buildUI();   // ALWAYS show UI first
loadData();  // then sync
setInterval(loadData, 2000);

</script>

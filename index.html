<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DPL Cricket League — Jersey Colour Selection</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body { background:#06090f; color:#dde3f0; font-family:'DM Sans'; margin:0; }
header { text-align:center; padding:40px; }
h1 { font-family:'Bebas Neue'; font-size:60px; }

.form-grid { max-width:900px; margin:auto; padding:20px; display:grid; gap:12px; }

.card {
  background:#111827;
  padding:15px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:0.2s;
}

.card:hover { transform: translateY(-2px); }

.locked {
  border:2px solid #22c55e;
  box-shadow:0 0 15px rgba(34,197,94,0.3);
}

select {
  padding:8px;
  border-radius:6px;
  background:#1f2937;
  color:#fff;
  border:none;
}

.color-dot {
  width:20px;
  height:20px;
  border-radius:50%;
}

.colour-pill {
  padding:5px 12px;
  border-radius:20px;
  font-size:12px;
  font-weight:600;
  margin-left:10px;
}
</style>
</head>

<body>

<header>
  <h1>DPL JERSEY SELECTION</h1>
  <p>Select once → permanently locked</p>
</header>

<div class="form-grid" id="formGrid"></div>

<script>

/* 🔥 GOOGLE API */
const API_URL = "https://script.google.com/macros/s/AKfycbzqTuJ7ZN31ZbOK5LZ3jfTlDi83RqflO233OJf9a4QpVKcVMSJ2Tj-Yc3d0U6_Zn1P_UQ/exec";

/* 🎨 COLOURS */
const COLOURS = [
{name:"Red",hex:"#FF0000"},{name:"Blue",hex:"#0000FF"},
{name:"Green",hex:"#00FF00"},{name:"Yellow",hex:"#FFFF00"},
{name:"Orange",hex:"#FFA500"},{name:"Purple",hex:"#800080"},
{name:"Pink",hex:"#FFC0CB"},{name:"Sky Blue",hex:"#87CEEB"},
{name:"Navy Blue",hex:"#000080"},{name:"Maroon",hex:"#800000"},
{name:"Lime",hex:"#32CD32"},{name:"Teal",hex:"#008080"},
{name:"Olive",hex:"#808000"},{name:"Cyan",hex:"#00FFFF"},
{name:"Magenta",hex:"#FF00FF"},{name:"Gold",hex:"#FFD700"},
{name:"Bronze",hex:"#CD7F32"},{name:"Coral",hex:"#FF7F50"},
{name:"Turquoise",hex:"#40E0D0"},{name:"Indigo",hex:"#4B0082"},
{name:"Violet",hex:"#EE82EE"},{name:"Crimson",hex:"#DC143C"},
{name:"Khaki",hex:"#F0E68C"},{name:"Mint",hex:"#98FF98"},
{name:"Chocolate",hex:"#D2691E"},{name:"Charcoal",hex:"#36454F"},
{name:"Royal Blue",hex:"#4169E1"},{name:"Neon Green",hex:"#39FF14"},
{name:"Hot Pink",hex:"#FF1493"},{name:"Deep Orange",hex:"#FF4500"},
{name:"Electric Blue",hex:"#7DF9FF"},{name:"Dark Forest Green",hex:"#014421"}
];

/* 🏏 TEAMS */
const TEAMS = [
"TDL Group Of Company","BARCLAYS","INFOSYS","TDS",
"Congruent Infotech Pvt ltd","V Ships","Walmart","Salpcom",
"NASCO (DAE)","ENSONO Tech","INTELECT","CAMS",
"Zoho Corporation Pvt Limited","Ovation Services Private Limited",
"Standard Charted Bank","spectra medical India pvt ltd",
"GEN DIGITAL","APOLLO TYRES","HCL","FOURKITES",
"Societe Generale","Agilisium consulting service pvt ltd",
"DEPARTMENT OF ATOMIC ENERGY","Hapag Lloyd Global Service Pvt Ltd",
"Comcast India Engineering Center","Walmart Global Tech",
"Zifo Technologies Pvt Ltd","Fidelity Investments"
];

let selections = {};
let locked = {};

/* 🔄 LOAD DATA */
async function loadData() {
  try {
    const res = await fetch(API_URL + "?t=" + Date.now());
    const text = await res.text();

    if (!text.startsWith("{")) return;

    const data = JSON.parse(text);

    selections = {};
    locked = {};

    Object.keys(data).forEach(team => {
      const idx = TEAMS.indexOf(team);
      if (idx !== -1) {
        selections[idx] = data[team];
        locked[idx] = true;
      }
    });

    buildUI();

  } catch {}
}

/* 🎨 UI */
function buildUI() {
  const grid = document.getElementById("formGrid");
  grid.innerHTML = "";

  const used = new Set(Object.values(selections));

  TEAMS.forEach((team, idx) => {
    const selected = selections[idx];
    const col = COLOURS.find(c => c.name === selected);

    let options = `<option value="">Select Colour</option>`;

    COLOURS.forEach(c => {
      const taken = used.has(c.name) && c.name !== selected;

      options += `
        <option value="${c.name}" ${selected===c.name?'selected':''} ${taken?'disabled':''}>
        ${taken?'✕ ':''}${c.name}
        </option>`;
    });

    const card = document.createElement("div");
    card.className = "card" + (selected ? " locked" : "");

    card.innerHTML = `
      <strong>${team}</strong>

      <div style="display:flex;align-items:center;gap:10px;">
        <div class="color-dot" style="background:${col?col.hex:'#333'}"></div>

        <select onchange="selectColour(${idx}, this)" ${selected?'disabled':''}>
          ${options}
        </select>

        ${selected ? `<div class="colour-pill" style="background:${col.hex}">${selected}</div>` : ''}
      </div>
    `;

    grid.appendChild(card);
  });
}

/* 💾 SAVE */
async function selectColour(idx, el) {
  const colour = el.value;
  if (!colour) return;

  if (!confirm("Confirm selection? This cannot be changed.")) {
    el.value = "";
    return;
  }

  try {
    const res = await fetch(API_URL, {
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body:JSON.stringify({
        team: TEAMS[idx],
        colour
      })
    });

    const text = await res.text();
    const data = JSON.parse(text);

    if (data.status === "error") {
      alert(data.message);
      el.value = "";
      return;
    }

    selections[idx] = colour;
    locked[idx] = true;

    buildUI();

  } catch {
    alert("Server error");
  }
}

/* INIT */
buildUI();
loadData();
setInterval(loadData, 2000);

</script>

</body>
</html>
